llm:
  provider: gemini
  model_name: gemini-2.5-flash-lite

data_sources:
  active:
    - type: newsdata
      params:
        query: "supply chain disruption India"
    - type: rss
      params:
        feed_urls: []
    - type: openweather
      params:
        locations: []

rag:
  persist_directory: ./data/chroma
  embedding_model: all-MiniLM-L6-v2
  top_k: 5

orchestration:
  macro_loop_interval_hours: 3
  micro_loop_max_iterations: 5
  confidence_threshold: 7.0
