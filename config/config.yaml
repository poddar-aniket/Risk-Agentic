app:
  name: "RiskRadar"
  environment: "development"
  scheduler_interval_hours: 3

llm:
  provider: "gemini"
  model: "gemini-2.5-flash-lite"
  temperature: 0.2

rag:
  vector_store_path: "./data/chroma_db"
  embedding_model: "all-MiniLM-L6-v2"

database:
  url: "sqlite:///./data/riskradar.db"

ingestion:
  active_sources:
    - "newsdata"
    - "rss"
    - "openweather"
  rss_feeds:
    # Example feed, can be replaced later
    - "http://feeds.bbci.co.uk/news/world/rss.xml"

thresholds:
  supervisor_confidence: 7
